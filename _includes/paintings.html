<div class="art-container">
  <img id="artwork" tabindex="0" onclick="go();" />
  <p id="description" class="description" onclick="go(-1)"></p>
</div>

<style>
  .art-container {
    height: 100vh;
    padding: 0.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #artwork {
    display: block;
    max-height: 90vh;
    margin: 0 auto;
  }

  .description {
    font-family: "Atkinson Hyperlegible Mono", "Inconsolata", monospace;
    text-align: center !important;
    font-size: 0.85rem;
    font-weight: 300;
    margin: 0 auto;
    margin-top: 0.2rem;
  }
</style>
<script>

  let metadata = null;
  const img = document.getElementById("artwork");
  let lastid = null



  async function loadMetadata() {
    try {
      const response = await fetch("/assets/data/artworks.json", {
        headers: {
          'Content-Type': 'application/json'
        }
      });
      metadata = await response.json();
    } catch (error) {
      console.error("Error fetching art:", error);
      return;
    }
  }

  async function load(id) {
    artwork = metadata[id];
    img.src = artwork.path;
    img.alt = artwork.name;
    document.getElementById("description").innerHTML = artwork.name;
  }

  async function preload(id) {
    try {
      await fetch(metadata[id].path, {
      });
    } catch (error) {
      console.error(error);
      return;
    }
  }

  const go = async (delta = 1) => {
    if (metadata == null) {
      await loadMetadata()
    }
    if (lastid == null) {
      lastid = Math.floor(Math.random() * metadata.length);
    }
    nextid = (lastid + delta) % metadata.length
    await load(nextid)
    lastid = nextid
    await preload(nextid)
  }

  img.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') {
      go();
    }
  });

  go();

</script>
